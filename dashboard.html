<meta name="description" content="Формуляр вашего заказа: этапы, цена, переписка с мастером и файлы — всё на сайте, без мессенджеров." />

<script>(function(){try{var t=localStorage.getItem("salon_theme");if(!t&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)t="dark";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<style>
  /* ============================================================
     КАБИНЕТ — «дело заказа»: один лист-формуляр с разделами.
     Язык «Оттиска»: листы, волосяные линии, mono-меты, сургуч.
     Ни отточий, ни синих пунктиров — им тут не место.
     ============================================================ */
  .cab{max-width:760px;margin:0 auto}
  .cab-h{font-size:clamp(26px,3.4vw,42px);font-weight:360;margin-bottom:clamp(18px,3vw,28px)}

  /* строка личности — тонкая, над формуляром */
  .cab-id{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:16px;font-size:13.5px;color:var(--ink-soft)}
  .cab-id .ci-dot{width:7px;height:7px;border-radius:50%;background:var(--verify);flex:0 0 auto;align-self:center}
  .cab-id .ci-dot.guest{background:var(--hairline-strong)}
  .cab-id b{color:var(--ink);font-weight:500}
  .cab-id .ci-act{margin-left:auto}
  .linkbtn{background:none;border:0;padding:0 0 1px;font:inherit;font-size:13px;color:var(--ink-soft);border-bottom:1px solid var(--hairline-strong);cursor:pointer;white-space:nowrap}
  .linkbtn:hover{color:var(--ink)}
  .linkbtn.wax{color:var(--wax);border-color:var(--wax)}
  .linkbtn.wax:hover{color:var(--wax-deep)}

  /* корешки заказов — закладки картотеки над листом */
  .ord-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0 12px;margin-bottom:-1px;position:relative;z-index:2}
  .ord-tab{
    border:1px solid var(--hairline);border-bottom:0;background:var(--paper-2);
    border-radius:6px 6px 0 0;padding:8px 13px 10px;cursor:pointer;font:inherit;
    font-size:12.5px;color:var(--ink-soft);display:flex;gap:8px;align-items:baseline;
    transition:background .15s,color .15s;
  }
  .ord-tab:hover{background:var(--mark)}
  .ord-tab .ot-no{font-family:var(--mono);font-size:11px;letter-spacing:.04em}
  .ord-tab.on{background:var(--sheet);color:var(--ink);border-color:var(--hairline-strong);position:relative}
  .ord-tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--sheet)}
  .ord-tab .ot-unread{font-family:var(--mono);font-size:10px;color:#FFFEF9;background:var(--wax);border-radius:9px;padding:1px 6px;align-self:center}
  /* корешок и ряд «Архива»: приглушённые, пунктирные — как старые папки */
  .ord-tab.ot-arch{border-style:dashed;color:var(--ink-faint)}
  .ord-tab.ot-arch.on{background:var(--paper-2);color:var(--ink-soft);border-style:solid}
  .ord-tabs-arch{margin-top:2px;margin-bottom:-1px}
  .ord-tabs-arch .ord-tab{opacity:.85}
  .ord-tab.ot-ghost{border-style:dashed;color:var(--ink-faint);background:transparent}

  /* шапка формуляра */
  .ord-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px 14px;flex-wrap:wrap;margin-bottom:14px}
  .ord-no{font-size:13px;letter-spacing:.1em;color:var(--ink-soft)}
  .ord-stamp{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    border:1.5px solid currentColor;border-radius:3px;padding:5px 10px;
    transform:rotate(-1.2deg);color:var(--ink-soft);white-space:nowrap;
  }
  .ord-stamp.s-act{color:var(--wax)}
  .ord-stamp.s-done{color:var(--verify)}
  .ord-stamp.s-mute{color:var(--ink-faint)}
  .ord-type{font-size:clamp(22px,3vw,30px);font-weight:400;margin-bottom:6px}
  .ord-topic{font-family:var(--serif);font-style:italic;font-size:15.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:6px}
  .ord-price-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px 12px;flex-wrap:wrap;margin-top:18px;padding-top:14px;border-top:3px double var(--ink)}
  .ord-price{font-size:clamp(18px,2.4vw,22px);letter-spacing:-.02em;white-space:nowrap}
  .ord-price-note{margin-top:8px}

  /* разделы дела: волосяная линия + caps-заголовок */
  .fs-sec{margin-top:clamp(24px,4vw,34px);padding-top:clamp(16px,2.6vw,22px);border-top:1px solid var(--hairline)}
  .fs-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .fs-head .fs-meta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint)}

  /* этапы — таймлайн с номерами-печатями (как «Пригласить друга» в клубе) */
  .stg{position:relative}
  .stg::before{content:"";position:absolute;left:15px;top:22px;bottom:22px;width:1px;background:var(--hairline-strong)}
  .stg-row{display:flex;gap:14px;padding:9px 0;align-items:flex-start;color:var(--ink-soft)}
  .stg-row .sn{
    position:relative;z-index:1;flex:0 0 31px;height:31px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:11px;background:var(--sheet);
    border:1px solid var(--hairline-strong);color:var(--ink-faint);
  }
  .stg-row.past .sn{color:var(--verify);border-color:var(--verify)}
  .stg-row.now{color:var(--ink)}
  .stg-row.now .sn{color:#FFFEF9;background:var(--wax);border-color:var(--wax)}
  .stg-row .sb{flex:1;min-width:0;padding-top:4px}
  .stg-row .sb b{display:block;font-size:15px;font-weight:500;line-height:1.35}
  .stg-row .sb small{display:block;font-size:13px;color:var(--ink-soft);line-height:1.55;margin-top:2px}
  .stg-row .st-tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;padding-top:9px}
  .stg-row.past .st-tag{color:var(--verify)}
  .stg-row.now .st-tag{color:var(--wax)}

  /* вкладыш с реквизитами / служебные вставки */
  .req-slip{border:1px solid var(--hairline-strong);border-left:3px solid var(--wax);border-radius:var(--r);padding:14px 16px;background:var(--paper-2);margin-bottom:12px}
  .req-slip .caps{display:block;margin-bottom:6px}
  .req-pre{white-space:pre-wrap;word-break:break-word;font-size:13.5px;margin:6px 0 0;line-height:1.6}

  .act-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .act-row .btn{flex:1 1 auto}
  .fix-form{margin-top:12px}
  .fix-form textarea,.chat-form textarea{
    width:100%;font:inherit;font-size:14.5px;padding:10px 12px;color:inherit;resize:vertical;
    border:1px solid var(--hairline-strong);border-radius:var(--r);background:transparent;
  }

  /* файлы — опись вложений */
  .file-line{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--hairline)}
  .file-line:last-child{border-bottom:0}
  .file-line .fl-ic{flex:0 0 auto;color:var(--ink-faint);align-self:center}
  .file-line .fl-name{flex:1;min-width:0;overflow-wrap:anywhere;font-size:14.5px}
  .file-line .fl-meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint);white-space:nowrap}
  .file-line .link{white-space:nowrap;font-size:13.5px}
  .btn-upload{cursor:pointer}

  /* переписка — почтовая лента дела, без рамок-пузырей */
  .chat-feed{display:flex;flex-direction:column;gap:14px;max-height:440px;overflow-y:auto;padding:2px 2px 6px}
  .chat-m{max-width:92%;padding-left:14px;border-left:2px solid var(--hairline-strong)}
  .chat-m.me{align-self:flex-end;border-left:0;border-right:2px solid var(--wax);padding-left:0;padding-right:14px;text-align:right}
  .chat-who{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px}
  .chat-m.me .chat-who{color:var(--wax)}
  .chat-txt{font-size:14.5px;line-height:1.6;color:var(--ink);white-space:pre-wrap}
  .chat-at{display:block;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:3px}
  .chat-sys{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint)}
  .chat-form{display:flex;gap:10px;margin-top:14px;align-items:flex-end}
  .chat-form textarea{flex:1}

  /* вход */
  .cab-login{max-width:540px;margin:0 auto}
  .cab-login-hint{margin-top:10px}
  .cab-foot{margin-top:clamp(28px,5vw,44px);padding-top:14px;border-top:1px solid var(--hairline)}
  .cab-foot-sync{margin-top:clamp(22px,4vw,32px);text-align:center}

  /* автопрокрутки и чипы не ныряют под шапку */
  #cabRoot .fs-sec[id],#subPaySheet,#plusCard,#plusSheet,#bonusLedger{scroll-margin-top:74px}

  /* полоса «клуба»: бонусы и подписка одной строкой, детали по клику */
  .club-strip{display:flex;align-items:baseline;gap:8px 10px;flex-wrap:wrap;
    border:1px solid var(--hairline);border-radius:var(--r);background:var(--paper-2);
    padding:10px 14px;margin-bottom:14px;font-size:13.5px;color:var(--ink-soft)}
  .club-strip b{color:var(--ink)}
  .club-strip .cs-dot{color:var(--ink-faint)}
  .club-strip .cs-warn{color:var(--wax)}
  .club-strip .cs-more{margin-left:auto}

  /* свёрнутые способы входа (почта, ссылка доступа) */
  .cab-alt{border:1px solid var(--hairline);border-radius:var(--r);padding:0 14px;margin:8px 0}
  .cab-alt summary{cursor:pointer;padding:11px 0;font-size:13.5px;color:var(--ink-soft);list-style:none;user-select:none}
  .cab-alt summary::-webkit-details-marker{display:none}
  .cab-alt summary::before{content:"▸";display:inline-block;margin-right:8px;color:var(--ink-faint);transition:transform .15s}
  .cab-alt[open] summary::before{transform:rotate(90deg)}
  .cab-alt summary:hover{color:var(--ink)}

  /* шапка карточки плана «Салон+»: название + слоган переносятся по-человечески */
  .pl-h{display:flex;flex-wrap:wrap;gap:2px 12px;align-items:baseline;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--hairline)}
  .pl-h .pl-tag{font-size:12.5px;color:var(--ink-soft)}

  /* чипы-навигация по делу: на телефоне доводят до нужного раздела
     без листания всей простыни (Оплата · Файлы · Переписка · Управление) */
  .ord-jump{display:none;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px 0 2px;padding-bottom:2px;scrollbar-width:none}
  .ord-jump::-webkit-scrollbar{display:none}
  .ord-jump .oj{flex:0 0 auto;font:inherit;font-size:12.5px;line-height:1;padding:10px 14px;border:1px solid var(--hairline-strong);border-radius:999px;background:var(--paper-2);color:var(--ink-soft);cursor:pointer;white-space:nowrap}
  .ord-jump .oj.hot{border-color:var(--wax);color:var(--wax);font-weight:600}
  .ord-jump .oj:active{background:var(--mark)}

  @media(max-width:740px){
    /* iPhone: поля ввода мельче 16px заставляют Safari зумить страницу
       при фокусе — вёрстка «уезжает». Держим 16px, зум не срабатывает. */
    #cabRoot input[type="text"],#cabRoot input[type="email"],#cabRoot input[type="date"],
    #cabRoot input[type="number"],#cabRoot textarea{font-size:16px!important}
    /* меньше служебной шапки — дело начинается выше */
    .cab-page .chapter{padding-top:30px}
    .cab-page .ch-rule{margin-bottom:12px}
    .cab-h{font-size:23px;margin-bottom:12px}
    .ord-jump{display:flex}
    /* корешки заказов — одна строка с прокруткой, не растут в высоту */
    .ord-tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 6px}
    .ord-tabs::-webkit-scrollbar{display:none}
    .ord-tab{flex:0 0 auto;white-space:nowrap}
  }
  @media(max-width:540px){
    /* строка личности: без сиротской точки-индикатора, «выйти» не ломает строку */
    .cab-id{row-gap:4px}
    .cab-id .ci-dot{display:none}
    .act-row{flex-direction:column}
    .act-row .btn{width:100%}
    .chat-m{max-width:100%}
    .stg-row .st-tag{display:none}
    .sheet-pad{padding:16px 14px}
    .fs-sec{margin-top:22px;padding-top:14px}
    .chat-feed{max-height:56vh}
    /* поле сообщения на всю ширину, кнопка под ним — пальцу удобнее */
    .chat-form{flex-direction:column;align-items:stretch}
    .chat-form .btn{width:100%}
    /* платёжный лист и карточки бонусов/подписки — плотнее */
    .cbn-card{padding:14px}
    .payslip .ps-head{padding:12px 14px 8px}
    .payslip .ps-body{padding:4px 14px 8px}
  }
</style>
