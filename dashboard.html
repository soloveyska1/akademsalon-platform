<title>Личный кабинет — Академический Салон</title>
<meta name="description" content="Формуляр вашего заказа: этапы работы, график оплаты, отчёт о проверках. Кабинет работает прямо в браузере." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script>(function(){try{var t=localStorage.getItem("salon_theme");if(!t&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)t="dark";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<style>
  /* ============================================================
     КАБИНЕТ — формуляр заказа: одна колонка ≤720px.
     Демо-витрина этапной механики + реальные заявки из localStorage.
     ============================================================ */
  .cab{max-width:720px;margin:0 auto}
  .cab-h{font-size:clamp(26px,3.4vw,42px);font-weight:360;margin-bottom:clamp(20px,3vw,32px)}

  /* честная пометка демо-примера */
  .demo-note{
    display:flex;flex-wrap:wrap;align-items:center;gap:12px 16px;
    padding:16px 18px;margin-bottom:22px;
    border:1px dashed var(--stamp);border-radius:var(--r);
    background:rgba(58,78,122,.05);
  }
  .demo-note .dn-text{flex:1 1 240px;font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:0}
  .demo-note .btn{flex:0 0 auto}

  /* переключатель заказов (если их больше одного) */
  .ord-switch{display:flex;flex-direction:column;margin-bottom:20px}
  .ord-switch .dotrow{width:100%;background:transparent;border:0;cursor:pointer;font:inherit;color:inherit;min-height:44px;transition:background .12s}
  .ord-switch .dotrow:hover{background:var(--mark)}
  .ord-switch .osw-no{font-size:12.5px;color:var(--ink-soft);letter-spacing:.06em}
  .ord-switch .osw-type{font-size:14.5px}
  .ord-switch .dr-val{font-size:12px;color:var(--ink-soft)}

  /* шапка формуляра */
  .ord-top{display:flex;justify-content:space-between;align-items:center;gap:10px 14px;flex-wrap:wrap;margin-bottom:16px}
  .ord-no{font-size:13.5px;letter-spacing:.1em;color:var(--ink-soft)}
  .ord-type{font-size:clamp(22px,3vw,30px);font-weight:400;margin-bottom:6px}
  .ord-topic{font-family:var(--serif);font-style:italic;font-size:15.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:6px}
  .ord-price-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px 12px;flex-wrap:wrap;margin-top:18px;padding-top:14px;border-top:3px double var(--ink)}
  .ord-price{font-size:clamp(18px,2.4vw,22px);letter-spacing:-.02em;white-space:nowrap}
  .ord-price-note{margin-top:8px}

  /* этапы: строки-отточия с состояниями */
  .stage-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin:28px 0 4px}
  .stage-prog{font-size:12px;color:var(--ink-soft);letter-spacing:.08em}
  .stage-row{flex-wrap:wrap;row-gap:2px}
  .stage-row .st-no{font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums;color:var(--ink-faint);flex:0 0 24px}
  .stage-row.is-past .st-no{color:var(--verify)}
  .stage-row.is-now .st-no{color:var(--ink)}
  .stage-row.is-next{color:var(--ink-soft)}
  .stage-row small{flex-basis:100%;padding-left:36px;font-size:13px;color:var(--ink-soft);line-height:1.5}
  .stage-row .dr-val{font-size:12px;color:var(--ink-soft)}
  .tag.tag-mini{font-size:10px;padding:3px 8px;gap:5px}

  /* оплата и отчёт */
  .pay-block{margin-top:clamp(32px,5vw,48px)}
  .pay-block > .caps{display:block;margin-bottom:20px}
  .pay-note{margin-top:14px}
  .report-block{margin-top:clamp(32px,5vw,48px)}
  .rp-empty{border:1px dashed var(--hairline-strong);border-radius:var(--r);padding:24px 18px;text-align:center}

  /* связь */
  .contact-row{
    display:flex;justify-content:space-between;align-items:center;gap:14px 18px;flex-wrap:wrap;
    margin-top:clamp(32px,5vw,48px);padding-top:22px;border-top:1px solid var(--hairline);
  }
  .contact-row .cr-q{font-family:var(--serif);font-size:17px}
  .cr-btns{display:flex;gap:10px;flex-wrap:wrap}

  .cab-foot{margin-top:clamp(28px,5vw,44px);padding-top:14px;border-top:1px solid var(--hairline)}

  @media(max-width:540px){
    .contact-row{flex-direction:column;align-items:stretch}
    .cr-btns{width:100%}
    .cr-btns .btn{flex:1}
  }
</style>

<body>

<main class="cab-page">
  <div class="wrap">

    <section class="chapter cab" id="formular" data-chapter="Формуляр заказа">
      <div class="ch-rule"><span class="ch-no">§ 01 · Формуляр заказа</span></div>
      <h1 class="cab-h reveal">Личный кабинет</h1>

      <div id="cabRoot">
        <noscript>
          <p class="petit">Формуляр заказа собирается в вашем браузере — включите JavaScript, чтобы его увидеть.</p>
        </noscript>
      </div>

      <p class="petit cab-foot reveal">Здесь сохраняются ваши расчёты — прямо в браузере, без регистрации. Настоящий кабинет с заказами, статусами, чатом и бонусами живёт в <a class="link" href="https://t.me/academic_saloon_bot" target="_blank" rel="noopener">Telegram-боте</a>.</p>
    </section>

  </div>
</main>

<script src="assets/js/app.js?v=20260709a"></script>
<script>
function initDash() {
  'use strict';
  var C = window.SalonCalc, S = window.Salon;
  var root = document.getElementById('cabRoot');
  if (!C || !root) return;

  /* ---------- данные ---------- */
  var STAGES = ['Заявка', 'План', 'Главы', 'Проверки', 'Приёмка'];
  var NOW_TEXT = [
    'Изучаем тему и методичку — пришлём план и смету',
    'Согласуем структуру глав и фиксируем смету',
    'Пишем главы и показываем черновики по мере готовности',
    'Проводим проверки — отчёт покажем до финальной оплаты',
    'Вносим правки по замечаниям — бесплатно, пока работу не примут'
  ];
  var TRIPLE = ['diplom', 'master', 'chapter', 'scopus'];

  function label(list, id) {
    var x = list.find(function (i) { return i.id === id; });
    return x ? x.label : '';
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function stage(o) { return Math.min(Math.max(parseInt(o.stageIndex, 10) || 0, 0), 4); }

  var raw = (S && S.store.get('salon_orders', [])) || [];
  /* записи без typeId — старый формат прежнего сайта, пропускаем */
  raw = Array.isArray(raw) ? raw.filter(function (o) { return o && o.id && o.typeId; }) : [];
  var isDemo = !raw.length;
  var orders;
  if (isDemo) {
    var q = C.quote('master', 'hum', 'free', 'turn');
    orders = [{
      id: 'AS-DEMO', createdAt: 0,
      typeId: 'master', typeLabel: label(C.types, 'master'),
      discId: 'hum', discLabel: label(C.disciplines, 'hum'),
      termId: 'free', termLabel: label(C.terms, 'free'),
      tierId: 'turn', tierLabel: label(C.tiers, 'turn'),
      priceLow: q.low, priceHigh: q.high,
      topic: 'Управление мотивацией персонала в проектных командах',
      contact: '', stageIndex: 2
    }];
  } else {
    orders = raw.slice().sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
  }
  var current = 0;

  /* ---------- мелкие шаблоны ---------- */
  function tplDemoNote() {
    return '<div class="demo-note reveal">' +
      '<span class="tag tag-stamp">Демо-пример</span>' +
      '<p class="dn-text">Так будет выглядеть ваш заказ после заявки. Это образец, не реальный заказ.</p>' +
      '<a class="btn btn-wax" href="configurator.html">Рассчитать свою работу <span class="ar">→</span></a>' +
      '</div>';
  }

  function tplSwitch() {
    return '<div class="ord-switch reveal" role="group" aria-label="Ваши заказы">' +
      orders.map(function (o, i) {
        var st = stage(o);
        return '<button type="button" class="dotrow' + (i === current ? ' hl' : '') + '" data-ord="' + i + '" aria-pressed="' + (i === current) + '">' +
          '<span class="mono osw-no">' + esc(o.id) + '</span>' +
          '<span class="osw-type">' + esc(o.typeLabel || label(C.types, o.typeId)) + '</span>' +
          '<span class="dots"></span>' +
          '<span class="dr-val">этап ' + (st + 1) + ' из 5</span>' +
          '</button>';
      }).join('') + '</div>';
  }

  function stageRow(i, st) {
    var cls = i < st ? ' is-past' : i === st ? ' hl is-now' : ' is-next';
    var val = i < st ? '<span class="tag tag-verify tag-mini">принято</span>'
      : i === st ? '<span class="dr-val">сейчас</span>'
      : '<span class="dr-val">—</span>';
    var now = i === st ? '<small>' + NOW_TEXT[st] + '</small>' : '';
    return '<div class="dotrow stage-row' + cls + '">' +
      '<span class="st-no">0' + (i + 1) + '</span><span>' + STAGES[i] + '</span>' +
      '<span class="dots"></span>' + val + now + '</div>';
  }

  function tplCard(o) {
    var st = stage(o);
    var meta = [
      esc(o.discLabel || label(C.disciplines, o.discId)),
      esc(o.termLabel || label(C.terms, o.termId)),
      esc(o.tierLabel || label(C.tiers, o.tierId))
    ].filter(Boolean).join(' · ');
    if (o.createdAt) meta += ' · заявка от ' + new Date(o.createdAt).toLocaleDateString('ru-RU');
    var topic = o.topic ? '<p class="ord-topic">Тема: «' + esc(o.topic) + '»</p>' : '';
    var rows = STAGES.map(function (_, i) { return stageRow(i, st); }).join('');
    return '<article class="sheet sheet-pad stacked reveal" aria-label="Формуляр заказа ' + esc(o.id) + '">' +
      '<div class="ord-top">' +
        '<span class="mono ord-no">№ ' + esc(o.id) + '</span>' +
        '<span class="tag tag-ink">этап ' + (st + 1) + ' · ' + STAGES[st].toLowerCase() + '</span>' +
        (o.plan ? '<span class="tag tag-stamp">разбор плана</span>' : '') +
      '</div>' +
      '<h2 class="ord-type">' + esc(o.typeLabel || label(C.types, o.typeId)) + '</h2>' +
      topic +
      '<p class="petit">' + meta + '</p>' +
      '<div class="ord-price-row">' +
        '<span class="caps">Вилка сметы</span>' +
        '<span class="mono ord-price">' + C.fmt(o.priceLow) + ' – ' + C.fmt(o.priceHigh) + ' ₽</span>' +
      '</div>' +
      '<p class="petit ord-price-note">Итог внутри вилки зависит от объёма и требований методички; смета фиксируется после разбора плана и не меняется по нашей инициативе.</p>' +
      '<div class="stage-head">' +
        '<span class="caps">Этапы работы</span>' +
        '<span class="mono stage-prog">Этап ' + (st + 1) + ' из 5</span>' +
      '</div>' +
      '<div class="stage-list">' + rows + '</div>' +
      '</article>';
  }

  function tplPay(o) {
    if (o.typeId === 'kandidat') {
      return '<section class="pay-block reveal d1"><span class="caps">График оплаты</span>' +
        '<p class="petit pay-note">Кандидатскую считаем по главам — у каждой главы своя смета и свой график. Детали фиксируются после разбора плана.</p>' +
        '</section>';
    }
    var st = stage(o);
    var triple = TRIPLE.indexOf(o.typeId) > -1;
    var paid = st >= 4 ? 2 : st >= 2 ? 1 : 0;
    var steps = triple
      ? [['30%', 'Старт', 'старт и бронь слота'],
         ['40%', 'Середина', 'после показа основной части'],
         ['30%', 'Финал', 'перед финальной выдачей']]
      : [['50%', 'Старт', 'после согласования плана и сметы'],
         ['50%', 'Финал', 'перед финальной выдачей']];
    var html = '<section class="pay-block reveal d1"><span class="caps">График оплаты</span>' +
      '<div class="paysteps" style="--pay-n:' + steps.length + '">' +
      steps.map(function (s, i) {
        var done = i < paid;
        return '<div class="pstep' + (done ? ' paid' : '') + '">' +
          '<span class="ps-share">' + s[0] + '</span>' +
          '<b>' + s[1] + (done ? ' — внесено' : '') + '</b>' +
          '<small>' + s[2] + '</small></div>';
      }).join('') + '</div>';
    return html + '</section>';
  }

  function tplReport(o) {
    var txt = stage(o) < 3
      ? 'Появится на этапе «Проверки» — до финальной оплаты.'
      : 'Отчёт по вашей работе выдаётся на этом этапе — до финальной оплаты.';
    return '<section class="report-block reveal d2">' +
      '<div class="report-sheet sheet sheet-pad">' +
        '<div class="rp-head"><span class="rp-title">Отчёт о проверках</span></div>' +
        '<div class="rp-empty petit">' + txt + '</div>' +
      '</div></section>';
  }

  function tplContact() {
    return '<section class="contact-row reveal d2">' +
      '<span class="cr-q">Вопрос по заказу?</span>' +
      '<div class="cr-btns">' +
        '<a class="btn btn-wax" href="https://t.me/academic_saloon_bot" target="_blank" rel="noopener">Открыть бота</a>' +
        '<a class="btn btn-line" href="https://t.me/academicsaloon" target="_blank" rel="noopener">Написать человеку</a>' +
      '</div></section>';
  }

  /* ---------- рендер ---------- */
  function render() {
    var o = orders[current];
    root.innerHTML = [
      isDemo ? tplDemoNote() : '',
      orders.length > 1 ? tplSwitch() : '',
      tplCard(o),
      tplPay(o),
      tplReport(o),
      tplContact()
    ].join('');
    if (S && S.observeReveal) S.observeReveal(document);
  }

  root.addEventListener('click', function (e) {
    var b = e.target.closest('button[data-ord]');
    if (!b) return;
    var i = parseInt(b.getAttribute('data-ord'), 10);
    if (isNaN(i) || i === current) return;
    current = i;
    render();
    var nb = root.querySelector('button[data-ord="' + i + '"]');
    if (nb) nb.focus();
  });

  render();
}
if (document.prerendering) {
  document.addEventListener('prerenderingchange', initDash, { once: true });
} else {
  initDash();
}
</script>
</body>
</html>
