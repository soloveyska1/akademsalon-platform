<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Личный кабинет — Академический Салон</title>
<meta name="description" content="Формуляр вашего заказа: этапы, цена, переписка с мастером и файлы — всё на сайте, без мессенджеров." />
<meta name="robots" content="noindex" />
<link rel="stylesheet" href="assets/fonts/fonts.css?v=20260721g" />
<link rel="stylesheet" href="assets/css/styles.css?v=20260721g" />
<link rel="stylesheet" href="assets/css/chrome.css?v=20260721g" />
<link rel="stylesheet" href="assets/css/extras.css?v=20260721g" />
<script>(function(){try{var t=localStorage.getItem("salon_theme");if(!t&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)t="dark";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<style>
  /* ============================================================
     КАБИНЕТ «ЧИТАЛЬНЫЙ ЗАЛ» — редакция 2026-07.
     Иерархия сверху вниз: личность → «сейчас важно» (одно главное
     действие) → полка дел → формуляр дела → клуб и абонементы.
     Язык «Оттиска»: бумага, волосяные линейки, сургуч, mono-меты.
     Анимации — короткие CSS-переходы; при reduce-motion всё видно.
     ============================================================ */
  .cab{max-width:780px;margin:0 auto}
  .cab-h{font-size:clamp(26px,3.4vw,40px);font-weight:360;margin-bottom:clamp(14px,2.4vw,22px)}

  /* строка личности — тонкая, над формуляром */
  .cab-id{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-size:13.5px;color:var(--ink-soft)}
  .cab-id .ci-dot{width:7px;height:7px;border-radius:50%;background:var(--verify);flex:0 0 auto;align-self:center}
  .cab-id .ci-dot.guest{background:var(--hairline-strong)}
  .cab-id b{color:var(--ink);font-weight:500}
  .cab-id .ci-act{margin-left:auto}
  .linkbtn{background:none;border:0;padding:0 0 1px;font:inherit;font-size:13px;color:var(--ink-soft);border-bottom:1px solid var(--hairline-strong);cursor:pointer;white-space:nowrap}
  .linkbtn:hover{color:var(--ink)}
  .linkbtn.wax{color:var(--wax);border-color:var(--wax)}
  .linkbtn.wax:hover{color:var(--wax-deep)}

  /* ── «СЕЙЧАС ВАЖНО»: одно главное действие по всем делам ── */
  .now-card{position:relative;background:var(--sheet);border:1px solid var(--hairline-strong);
    border-left:4px solid var(--wax);border-radius:var(--r);
    padding:clamp(14px,2.4vw,20px) clamp(16px,3vw,24px);margin:0 0 16px;
    box-shadow:0 1px 0 var(--hairline),0 14px 30px -22px rgba(34,32,27,.45)}
  .now-card .nc-cap{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .now-card .nc-cap .caps{color:var(--wax);font-size:10.5px}
  .now-card .nc-no{font-family:var(--mono);font-size:11px;color:var(--ink-faint);letter-spacing:.06em}
  .now-card .nc-msg{font-family:var(--serif);font-size:clamp(17px,2.4vw,21px);font-weight:420;line-height:1.4;margin:7px 0 3px;text-wrap:balance}
  .now-card .nc-msg b{font-weight:600;white-space:nowrap}
  .now-card .nc-sub{font-size:13px;color:var(--ink-soft);line-height:1.55}
  .now-card .nc-act{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}

  /* ── полка дел: каждое дело — корешок тома, активный приподнят ── */
  .shelf{display:flex;gap:10px;overflow-x:auto;padding:8px 2px 14px;margin:0 -2px;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
  .shelf::-webkit-scrollbar{display:none}
  .spine{position:relative;flex:0 0 auto;scroll-snap-align:start;width:min(200px,58vw);text-align:left;
    background:var(--sheet);border:1px solid var(--hairline);border-top:3px solid var(--hairline-strong);
    border-radius:2px 2px 0 0;padding:9px 13px 10px;cursor:pointer;font:inherit;color:var(--ink-soft);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
  .spine:hover{transform:translateY(-2px);box-shadow:0 10px 20px -14px rgba(34,32,27,.5)}
  .spine.on{color:var(--ink);border-color:var(--hairline-strong);border-top-color:var(--wax);
    transform:translateY(-3px);box-shadow:0 12px 22px -14px rgba(34,32,27,.5)}
  .spine.st-act:not(.on){border-top-color:var(--wax);opacity:.94}
  .spine .sp-no{display:flex;justify-content:space-between;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--ink-faint)}
  .spine .sp-dot{font-family:var(--mono);font-size:10px;color:#FFFEF9;background:var(--wax);border-radius:9px;padding:1px 6px}
  .spine .sp-name{display:block;font-size:13.5px;font-weight:500;margin:3px 0 1px;color:inherit;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spine .sp-st{display:block;font-size:11.5px;color:var(--ink-faint)}
  .spine.st-act .sp-st{color:var(--wax)}
  .spine.sp-ghost{background:transparent;border-style:dashed;border-top-width:1px;box-shadow:none;align-self:stretch}
  .spine.sp-ghost:hover{transform:none;background:var(--mark)}
  .spine.sp-arch{opacity:.8}
  .shelf-base{border-top:3px double var(--hairline-strong);margin:-14px 0 clamp(16px,3vw,24px)}

  /* шапка формуляра */
  .ord-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px 14px;flex-wrap:wrap;margin-bottom:14px}
  .ord-no{font-size:13px;letter-spacing:.1em;color:var(--ink-soft)}
  .ord-stamp{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    border:1.5px solid currentColor;border-radius:3px;padding:5px 10px;
    transform:rotate(-1.2deg);color:var(--ink-soft);white-space:nowrap;
  }
  .ord-stamp.s-act{color:var(--wax)}
  .ord-stamp.s-done{color:var(--verify)}
  .ord-stamp.s-mute{color:var(--ink-faint)}
  .ord-type{font-size:clamp(22px,3vw,30px);font-weight:400;margin-bottom:6px}
  .ord-topic{font-family:var(--serif);font-style:italic;font-size:15.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:6px}
  .ord-price-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px 12px;flex-wrap:wrap;margin-top:18px;padding-top:14px;border-top:3px double var(--ink)}
  .ord-price{font-size:clamp(18px,2.4vw,22px);letter-spacing:-.02em;white-space:nowrap}
  .ord-price-note{margin-top:8px}

  /* разделы дела: волосяная линия + caps-заголовок */
  .fs-sec{margin-top:clamp(24px,4vw,34px);padding-top:clamp(16px,2.6vw,22px);border-top:1px solid var(--hairline)}
  .fs-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .fs-head .fs-meta{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint)}

  /* этапы — таймлайн с номерами-печатями (как «Пригласить друга» в клубе) */
  .stg{position:relative}
  .stg::before{content:"";position:absolute;left:15px;top:22px;bottom:22px;width:1px;background:var(--hairline-strong)}
  .stg-row{display:flex;gap:14px;padding:9px 0;align-items:flex-start;color:var(--ink-soft)}
  .stg-row .sn{
    position:relative;z-index:1;flex:0 0 31px;height:31px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:11px;background:var(--sheet);
    border:1px solid var(--hairline-strong);color:var(--ink-faint);
  }
  .stg-row.past .sn{color:var(--verify);border-color:var(--verify)}
  .stg-row.now{color:var(--ink)}
  .stg-row.now .sn{color:#FFFEF9;background:var(--wax);border-color:var(--wax)}
  .stg-row .sb{flex:1;min-width:0;padding-top:4px}
  .stg-row .sb b{display:block;font-size:15px;font-weight:500;line-height:1.35}
  .stg-row .sb small{display:block;font-size:13px;color:var(--ink-soft);line-height:1.55;margin-top:2px}
  .stg-row .st-tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;padding-top:9px}
  .stg-row.past .st-tag{color:var(--verify)}
  .stg-row.now .st-tag{color:var(--wax)}

  /* вкладыш с реквизитами / служебные вставки */
  .req-slip{border:1px solid var(--hairline-strong);border-left:3px solid var(--wax);border-radius:var(--r);padding:14px 16px;background:var(--paper-2);margin-bottom:12px}
  .req-slip .caps{display:block;margin-bottom:6px}
  .req-pre{white-space:pre-wrap;word-break:break-word;font-size:13.5px;margin:6px 0 0;line-height:1.6}

  .act-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .act-row .btn{flex:1 1 auto}
  .fix-form{margin-top:12px}
  .fix-form textarea,.chat-form textarea{
    width:100%;font:inherit;font-size:14.5px;padding:10px 12px;color:inherit;resize:vertical;
    border:1px solid var(--hairline-strong);border-radius:var(--r);background:transparent;
  }

  /* файлы — опись вложений */
  .file-line{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--hairline)}
  .file-line:last-child{border-bottom:0}
  .file-line .fl-ic{flex:0 0 auto;color:var(--ink-faint);align-self:center}
  .file-line .fl-name{flex:1;min-width:0;overflow-wrap:anywhere;font-size:14.5px}
  .file-line .fl-meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint);white-space:nowrap}
  .file-line .link{white-space:nowrap;font-size:13.5px}
  .btn-upload{cursor:pointer}

  /* переписка — почтовая лента дела, без рамок-пузырей */
  .chat-feed{display:flex;flex-direction:column;gap:14px;max-height:440px;overflow-y:auto;padding:2px 2px 6px}
  .chat-m{max-width:92%;padding-left:14px;border-left:2px solid var(--hairline-strong)}
  .chat-m.me{align-self:flex-end;border-left:0;border-right:2px solid var(--wax);padding-left:0;padding-right:14px;text-align:right}
  .chat-who{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px}
  .chat-m.me .chat-who{color:var(--wax)}
  .chat-txt{font-size:14.5px;line-height:1.6;color:var(--ink);white-space:pre-wrap}
  .chat-at{display:block;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:3px}
  .chat-sys{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint)}
  .chat-form{display:flex;gap:10px;margin-top:14px;align-items:flex-end}
  .chat-form textarea{flex:1}

  /* вход */
  .cab-login{max-width:540px;margin:0 auto}
  .cab-login-hint{margin-top:10px}
  /* тихий ряд «или»: ВК / Mail.ru / код на почту — минимализм, всё под рукой */
  .cab-or{display:flex;align-items:center;gap:12px;margin:16px 0 12px;
    color:var(--ink-faint);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .cab-or::before,.cab-or::after{content:"";flex:1;height:1px;background:var(--hairline)}
  .cab-prov{display:flex;gap:8px;flex-wrap:wrap}
  .cab-prov .btn{flex:1 1 30%;min-width:118px;font-size:13.5px;padding:10px 8px;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap}
  .pv-ic{font-weight:700;font-family:var(--sans);font-size:12.5px}
  .pv-vk{color:#07F}
  .pv-mr{color:var(--wax)}
  #cabEmailWrap[hidden]{display:none}
  .cab-foot{margin-top:clamp(28px,5vw,44px);padding-top:14px;border-top:1px solid var(--hairline)}
  .cab-foot-sync{margin-top:clamp(22px,4vw,32px);text-align:center}

  /* автопрокрутки и чипы не ныряют под шапку */
  #cabRoot .fs-sec[id],#subPaySheet,#plusCard,#plusSheet,#bonusLedger{scroll-margin-top:74px}

  /* ── полоса «клуба» — читательский билет: перфорация слева, детали по клику ── */
  .club-strip{position:relative;display:flex;align-items:baseline;gap:8px 10px;flex-wrap:wrap;
    border:1px solid var(--hairline-strong);border-radius:var(--r);background:var(--sheet);
    padding:11px 15px 11px 24px;margin-bottom:16px;font-size:13.5px;color:var(--ink-soft)}
  .club-strip::before{content:"";position:absolute;left:11px;top:7px;bottom:7px;width:0;
    border-left:1px dashed var(--hairline-strong)}
  .club-strip b{color:var(--ink)}
  .club-strip .cs-dot{color:var(--ink-faint)}
  .club-strip .cs-warn{color:var(--wax)}
  .club-strip .cs-more{margin-left:auto}

  /* ── абонементы «Салон+» — билеты читального зала ── */
  .seg{display:inline-flex;border:1px solid var(--hairline-strong);border-radius:999px;overflow:hidden;vertical-align:middle}
  .seg button{font:inherit;font-size:12.5px;line-height:1;padding:9px 15px;background:transparent;border:0;color:var(--ink-soft);cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .tickets{display:grid;grid-template-columns:repeat(auto-fit,minmax(212px,1fr));gap:14px;margin-top:14px}
  .ticket{position:relative;display:flex;flex-direction:column;gap:7px;
    background:var(--sheet);border:1px solid var(--hairline-strong);border-radius:3px;
    padding:16px 15px 15px 24px;overflow:hidden;
    transition:transform .18s ease,box-shadow .18s ease}
  .ticket::before{content:"";position:absolute;left:11px;top:8px;bottom:8px;width:0;
    border-left:1px dashed var(--hairline-strong)}
  .ticket:hover{transform:translateY(-3px);box-shadow:0 16px 28px -18px rgba(34,32,27,.5)}
  .ticket .tk-name{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;color:var(--ink);padding-right:20px}
  .ticket .tk-star{position:absolute;top:11px;right:12px;font-size:14px;line-height:1;opacity:.85}
  .ticket .tk-tag{font-size:12.5px;color:var(--ink-soft);line-height:1.5;min-height:38px}
  .ticket .tk-price{font-family:var(--serif);font-size:clamp(21px,2.6vw,25px);line-height:1.1;letter-spacing:-.01em;margin-top:2px}
  .ticket .tk-price small{display:block;font-family:var(--sans);font-size:11.5px;color:var(--ink-faint);letter-spacing:.02em;margin-top:3px}
  .ticket .tk-feats{list-style:none;margin:5px 0 3px;padding:0;display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--ink-soft);line-height:1.45}
  .ticket .tk-feats li{padding-left:13px;position:relative}
  .ticket .tk-feats li::before{content:"·";position:absolute;left:2px;color:var(--wax);font-weight:700}
  .ticket .tk-cta{margin-top:auto;padding-top:8px}
  .ticket .tk-cta .btn{width:100%}
  .ticket.rec{border-color:var(--wax);box-shadow:0 1px 0 var(--hairline)}
  .ticket.rec .rec-tape{position:absolute;top:15px;right:-40px;transform:rotate(38deg);
    background:var(--wax);color:#FFFEF9;font-family:var(--mono);font-size:9px;
    letter-spacing:.14em;text-transform:uppercase;padding:4px 46px;pointer-events:none;white-space:nowrap}
  @media (prefers-reduced-motion:no-preference){
    .ticket .tk-star{animation:tkStar 3.6s ease-in-out infinite}
    @keyframes tkStar{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-3px) rotate(8deg)}}
  }

  /* купон-апселл в деле: пунктир отрывного талона, не кричит */
  .upsell{display:flex;gap:12px;align-items:flex-start;border:1px dashed var(--hairline-strong);
    border-radius:var(--r);background:var(--paper-2);padding:12px 14px;margin-top:12px;
    font-size:13.5px;color:var(--ink-soft);line-height:1.55}
  .upsell .up-star{font-size:17px;line-height:1.3}
  .upsell b{color:var(--ink)}
  .upsell .linkbtn{margin-left:2px}

  /* свёрнутые способы входа (почта, ссылка доступа) */
  .cab-alt{border:1px solid var(--hairline);border-radius:var(--r);padding:0 14px;margin:8px 0}
  .cab-alt summary{cursor:pointer;padding:11px 0;font-size:13.5px;color:var(--ink-soft);list-style:none;user-select:none}
  .cab-alt summary::-webkit-details-marker{display:none}
  .cab-alt summary::before{content:"▸";display:inline-block;margin-right:8px;color:var(--ink-faint);transition:transform .15s}
  .cab-alt[open] summary::before{transform:rotate(90deg)}
  .cab-alt summary:hover{color:var(--ink)}

  /* шапка карточки плана «Салон+»: название + слоган переносятся по-человечески */
  .pl-h{display:flex;flex-wrap:wrap;gap:2px 12px;align-items:baseline;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--hairline)}
  .pl-h .pl-tag{font-size:12.5px;color:var(--ink-soft)}

  /* складные секции формуляра: второстепенное свёрнуто, но в одном клике */
  .fs-fold{border-top:1px solid var(--hairline);margin-top:clamp(18px,2.6vw,26px)}
  .fs-fold summary{display:flex;align-items:center;gap:10px;list-style:none;cursor:pointer;
    padding:12px 0 10px;user-select:none;-webkit-tap-highlight-color:transparent}
  .fs-fold summary::-webkit-details-marker{display:none}
  .fs-fold summary .fs-meta{margin-left:auto;font-size:12px;color:var(--ink-faint);text-align:right}
  .fs-fold .ff-ar{color:var(--ink-faint);font-size:11px;transition:transform .15s;flex:0 0 auto}
  .fs-fold[open] .ff-ar{transform:rotate(180deg)}
  .fs-fold summary:hover .caps{color:var(--ink)}
  .fs-fold .ff-body{padding:2px 0 6px}
  .fs-fold .ff-body .fs-sec{border-top:0;margin-top:8px;padding-top:0}

  /* талон-строка «Салон+» в деле — одна строка вместо карточки */
  .up-line{margin:12px 0 0;font-size:13.5px;color:var(--ink-soft);line-height:1.55}
  .up-line b{color:var(--ink)}

  /* билет-тариф v2: герой-выгода, ключевая строка, состав за раскрытием */
  .tk-hero{display:block;margin:10px 0 0;font:700 27px/1.05 var(--serif);color:var(--wax)}
  .tk-hero small{display:block;font:400 12px/1.5 var(--sans);color:var(--ink-soft);margin-top:3px}
  .tk-key{font-size:12.5px;color:var(--ink-soft);margin:8px 0 0;line-height:1.55}
  .tk-more{margin-top:8px;font-size:12.5px}
  .tk-more summary{cursor:pointer;color:var(--ink-faint);list-style:none;user-select:none}
  .tk-more summary::-webkit-details-marker{display:none}
  .tk-more summary::before{content:"▸";display:inline-block;margin-right:6px;transition:transform .15s}
  .tk-more[open] summary::before{transform:rotate(90deg)}
  .tk-more ul{margin:8px 0 0;padding-left:16px;display:grid;gap:5px;color:var(--ink-soft);line-height:1.5}

  /* конструктор-механика: плитки-опции + живой билет с итогом */
  .ctor{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-top:10px;align-items:start}
  .ctor-opts{display:grid;gap:8px}
  .ctor-opt{position:relative;display:grid;grid-template-columns:1fr auto;gap:2px 10px;text-align:left;
    padding:11px 13px;border:1px solid var(--hairline-strong);border-radius:var(--r);
    background:transparent;cursor:pointer;font:inherit;color:inherit;transition:border-color .12s,background .12s}
  .ctor-opt .co-name{font-weight:600;font-size:13.5px}
  .ctor-opt .co-hint{grid-column:1;font-size:12px;color:var(--ink-faint);line-height:1.45}
  .ctor-opt .co-price{grid-column:2;grid-row:1/span 2;align-self:center;font-family:var(--mono);font-size:13px;white-space:nowrap}
  .ctor-opt .co-tick{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
    background:var(--wax);color:var(--sheet);font-size:11px;line-height:20px;text-align:center;
    opacity:0;transform:scale(.5);transition:all .15s}
  .ctor-opt.on{border-color:var(--wax);background:var(--wax-soft)}
  .ctor-opt.on .co-tick{opacity:1;transform:none}
  .ctor-ticket{border:1px solid var(--hairline-strong);border-left:4px solid var(--wax);
    border-radius:var(--r);padding:14px;background:var(--sheet);position:sticky;top:10px}
  .ct-comp{margin:10px 0;padding:0;list-style:none;display:grid;gap:5px;font-size:12.5px;color:var(--ink-soft);line-height:1.45}
  .ct-comp li{display:flex;justify-content:space-between;gap:10px}
  .ct-comp li small{color:var(--ink-faint)}
  .ct-idle{color:var(--ink-faint)}
  .ct-per{margin:6px 0 8px}
  .ct-total{font:700 26px/1 var(--serif);margin:6px 0 2px}
  .ct-note{margin:4px 0 8px}
  @media(max-width:720px){.ctor{grid-template-columns:1fr}.ctor-ticket{position:static}}

  /* чипы-навигация по делу: на телефоне доводят до нужного раздела
     без листания всей простыни (Оплата · Файлы · Переписка · Управление) */
  .ord-jump{display:none;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px 0 2px;padding-bottom:2px;scrollbar-width:none}
  .ord-jump::-webkit-scrollbar{display:none}
  .ord-jump .oj{flex:0 0 auto;font:inherit;font-size:12.5px;line-height:1;padding:10px 14px;border:1px solid var(--hairline-strong);border-radius:999px;background:var(--paper-2);color:var(--ink-soft);cursor:pointer;white-space:nowrap}
  .ord-jump .oj.hot{border-color:var(--wax);color:var(--wax);font-weight:600}
  .ord-jump .oj:active{background:var(--mark)}

  @media(max-width:740px){
    /* iPhone: поля ввода мельче 16px заставляют Safari зумить страницу
       при фокусе — вёрстка «уезжает». Держим 16px, зум не срабатывает. */
    #cabRoot input[type="text"],#cabRoot input[type="email"],#cabRoot input[type="date"],
    #cabRoot input[type="number"],#cabRoot textarea{font-size:16px!important}
    /* меньше служебной шапки — дело начинается выше */
    .cab-page .chapter{padding-top:30px}
    .cab-page .ch-rule{margin-bottom:12px}
    .cab-h{font-size:23px;margin-bottom:12px}
    .ord-jump{display:flex}
    .now-card .nc-act .btn{flex:1 1 auto}
    .spine{width:min(180px,62vw)}
  }
  @media(max-width:540px){
    /* строка личности: без сиротской точки-индикатора, «выйти» не ломает строку */
    .cab-id{row-gap:4px}
    .cab-id .ci-dot{display:none}
    .act-row{flex-direction:column}
    .act-row .btn{width:100%}
    .chat-m{max-width:100%}
    .stg-row .st-tag{display:none}
    .sheet-pad{padding:16px 14px}
    .fs-sec{margin-top:22px;padding-top:14px}
    .chat-feed{max-height:56vh}
    /* поле сообщения на всю ширину, кнопка под ним — пальцу удобнее */
    .chat-form{flex-direction:column;align-items:stretch}
    .chat-form .btn{width:100%}
    /* платёжный лист и карточки бонусов/подписки — плотнее */
    .cbn-card{padding:14px}
    .payslip .ps-head{padding:12px 14px 8px}
    .payslip .ps-body{padding:4px 14px 8px}
    .tickets{grid-template-columns:1fr}
    .ticket .tk-tag{min-height:0}
    .club-strip{padding-left:22px}
    .seg{width:100%}
    .seg button{flex:1}
  }
