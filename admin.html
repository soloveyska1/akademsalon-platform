<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Кабинет мастера — Академический Салон</title>
<meta name="robots" content="noindex,nofollow,noarchive" />
<link rel="stylesheet" href="assets/fonts/fonts.css?v=20260717i" />
<link rel="stylesheet" href="assets/css/styles.css?v=20260717i" />
<link rel="stylesheet" href="assets/css/chrome.css?v=20260717i" />
<link rel="stylesheet" href="assets/css/extras.css?v=20260717i" />
<script>(function(){try{var t=localStorage.getItem("salon_theme");if(!t&&window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)t="dark";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
<link rel="icon" type="image/png" sizes="120x120" href="assets/img/favicon-120.png" />
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
<meta name="theme-color" content="#F6F1E7" />
<style>
  /* ============================================================
     КАБИНЕТ МАСТЕРА — рабочий стол поверх /api/admin/*.
     Стиль «Оттиск»: бумага, линейки-hairline, штампы статусов.
     Доступ: Telegram-вход аккаунта из ADMIN_IDS (иначе 403).
     ============================================================ */
  :root{
    --ag-due:#A8402F; --ag-ok:#2E6B4F; --ag-act:#3A4E7A;
  }
  body{background:var(--paper,#F6F1E7)}
  .ag{max-width:1240px;margin:0 auto;padding:0 clamp(10px,2vw,20px)}

  /* -------- шапка-мастхед -------- */
  .ag-mast{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:16px 0 12px;border-bottom:2px solid var(--ink);margin-bottom:0}
  .ag-mast h1{font-size:clamp(21px,2.6vw,30px);font-weight:420;letter-spacing:-.01em;margin-right:auto}
  .ag-mast h1 .mono{font-size:.55em;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase;display:block;font-family:var(--mono)}
  .ag-user{display:flex;gap:12px;align-items:center;font-size:13px;color:var(--ink-soft)}
  .ag-user b{color:var(--ink)}
  .ag-linkbtn{background:none;border:0;padding:0;cursor:pointer;font:inherit;color:inherit;text-decoration:underline;text-decoration-color:var(--hairline-strong);text-underline-offset:3px}
  .ag-linkbtn:hover{text-decoration-color:currentColor}

  /* -------- навигация-регистр -------- */
  .ag-nav{position:sticky;top:0;z-index:40;display:flex;gap:2px;overflow-x:auto;
    background:var(--paper,#F6F1E7);border-bottom:1px solid var(--hairline);
    margin:0 0 16px;padding:6px 0 0;scrollbar-width:none}
  .ag-nav::-webkit-scrollbar{display:none}
  .ag-tab{border:1px solid transparent;border-bottom:0;background:none;color:var(--ink-soft);
    font:inherit;font-size:14px;padding:10px 16px 12px;cursor:pointer;white-space:nowrap;
    border-radius:8px 8px 0 0;position:relative;display:flex;gap:7px;align-items:center}
  .ag-tab:hover{color:var(--ink);background:var(--mark)}
  .ag-tab.on{color:var(--ink);background:var(--sheet,#FDFBF5);border-color:var(--hairline);
    font-weight:500;box-shadow:0 1px 0 var(--sheet,#FDFBF5)}
  .ag-badge{min-width:19px;height:19px;border-radius:999px;background:var(--wax,#A8402F);color:#fff;
    font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;font-family:var(--mono)}
  .ag-badge.mut{background:var(--ink-soft)}

  /* -------- плитки сводки -------- */
  .ag-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:16px}
  .ag-tile{border:1px solid var(--hairline);border-radius:var(--r);padding:13px 15px;background:var(--sheet,transparent);
    display:flex;flex-direction:column;gap:2px;cursor:default}
  .ag-tile.click{cursor:pointer;transition:border-color .15s,transform .15s}
  .ag-tile.click:hover{border-color:var(--ink-soft);transform:translateY(-1px)}
  .ag-tile .t-num{font-family:var(--mono);font-size:24px;letter-spacing:-.02em}
  .ag-tile .t-lbl{font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--ink-soft)}
  .ag-tile.warn{border-left:3px solid var(--wax,#A8402F)}
  .ag-tile.calm{border-left:3px solid var(--ag-ok)}

  /* -------- лента «требует внимания» на сводке -------- */
  /* -------- «Сегодня на столе»: фокус-очередь -------- */
  .ag-desk{display:grid;gap:8px;margin-bottom:16px}
  .dk-row{display:flex;gap:12px;align-items:center;width:100%;text-align:left;cursor:pointer;
    border:1px solid var(--hairline-strong);border-left:4px solid var(--hairline-strong);
    border-radius:var(--r);background:var(--sheet,transparent);padding:11px 14px;font:inherit;color:var(--ink);
    transition:border-color .15s,background .15s}
  .dk-row:hover{background:var(--mark)}
  .dk-row.fire{border-left-color:var(--wax)}
  .dk-row.act{border-left-color:var(--stamp,#3A4E7A)}
  .dk-ic{flex:0 0 auto;font-size:17px}
  .dk-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .dk-main b{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dk-why{font-size:12.5px;color:var(--ink-soft)}
  .dk-sum{font-family:var(--mono);font-size:13px;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums}
  .dk-go{color:var(--ink-faint)}

  /* -------- календарь сдач: лента на две недели -------- */
  .ag-cal{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .cal-day{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:52px;
    border:1px solid var(--hairline);border-radius:var(--r);background:var(--sheet,transparent);
    padding:7px 6px;font:inherit;color:var(--ink-faint);cursor:pointer;position:relative;
    transition:border-color .15s,color .15s}
  .cal-day b{font-size:16px;font-weight:600}
  .cal-day .cd-dow{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase}
  .cal-day.has{color:var(--ink);border-color:var(--hairline-strong)}
  .cal-day.has .cd-n{position:absolute;top:-6px;right:-4px;background:var(--stamp,#3A4E7A);color:#fff;
    border-radius:9px;font-size:10.5px;line-height:1;padding:3px 6px;font-variant-numeric:tabular-nums}
  .cal-day.fire{color:var(--wax);border-color:var(--wax)}
  .cal-day.fire .cd-n{background:var(--wax)}
  .cal-day.on{border-color:var(--stamp,#3A4E7A);box-shadow:inset 0 0 0 1px var(--stamp,#3A4E7A);color:var(--ink)}
  .cal-day:hover{border-color:var(--hairline-strong)}

  .ag-money .ag-kv > div{display:flex;justify-content:space-between;gap:12px}
  .ag-money .ag-kv > div > b{text-align:right;font-weight:500}
  .ag-money .ag-kv > div > b b{font-weight:700}

  .ag-attn{border:1px solid var(--hairline-strong);border-left:4px solid var(--wax);border-radius:var(--r);
    padding:4px 0;margin-bottom:16px;background:var(--sheet,transparent)}
  .ag-attn .aa-row{display:flex;gap:10px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--hairline);cursor:pointer;font-size:14px}
  .ag-attn .aa-row:last-child{border-bottom:0}
  .ag-attn .aa-row:hover{background:var(--mark)}
  .ag-attn .aa-what{flex:1;min-width:0}
  .ag-attn .aa-go{font-family:var(--mono);font-size:12px;color:var(--ink-soft);white-space:nowrap}

  /* -------- фильтры и поиск -------- */
  .ag-filters{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .ag-chip{border:1px solid var(--hairline-strong);background:transparent;color:inherit;border-radius:999px;
    padding:6px 13px;font-size:12.5px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;font-family:var(--sans)}
  .ag-chip:hover{border-color:var(--ink-soft)}
  .ag-chip.on{background:var(--ink);color:var(--paper,#F6F1E7);border-color:var(--ink)}
  .ag-search{flex:1;min-width:170px;font:inherit;font-size:13.5px;padding:8px 14px;
    border:1px solid var(--hairline-strong);border-radius:999px;background:transparent;color:inherit}
  .ag-search:focus{outline:none;border-color:var(--ink-soft)}
  .ag-sort{font:inherit;font-size:12.5px;padding:7px 10px;border:1px solid var(--hairline-strong);
    border-radius:999px;background:transparent;color:inherit;cursor:pointer}
  .ag-more{justify-content:center;color:var(--ink-soft);font-size:13px;border-left:0!important}
  .ag-more:hover{color:var(--ink)}

  /* быстрые заготовки ответов */
  .ag-tpls{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 8px}
  .ag-tpl{border:1px dashed var(--hairline-strong);background:transparent;color:var(--ink-soft);
    border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:var(--sans);
    transition:color .15s,border-color .15s}
  .ag-tpl:hover{color:var(--wax,#A8402F);border-color:var(--wax,#A8402F)}

  /* выручка по неделям */
  .ag-weeks{display:flex;gap:8px;align-items:flex-end;border:1px solid var(--hairline);
    border-radius:var(--r);padding:14px 14px 10px;margin-bottom:16px;background:var(--sheet,transparent);
    overflow-x:auto}
  .ag-weeks .wk{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .ag-weeks .wk-bar{width:100%;max-width:44px;border-radius:3px 3px 0 0;background:var(--wax,#A8402F);opacity:.85}
  .ag-weeks .wk-bar.zero{background:var(--hairline-strong)}
  .ag-weeks .wk-sum{font-family:var(--mono);font-size:10px;color:var(--ink-soft);white-space:nowrap;min-height:13px}
  .ag-weeks .wk-lbl{font-family:var(--mono);font-size:10px;color:var(--ink-faint,#999)}

  /* -------- сплит: список + карточка -------- */
  .ag-split{display:grid;grid-template-columns:minmax(290px,4fr) minmax(380px,8fr);gap:16px;align-items:start}
  .ag-list{display:flex;flex-direction:column;max-height:78vh;overflow-y:auto;
    border:1px solid var(--hairline);border-radius:var(--r);background:var(--sheet,transparent)}
  .ag-row{display:flex;gap:10px;align-items:center;padding:11px 13px;border-bottom:1px solid var(--hairline);
    cursor:pointer;background:transparent;border-left:3px solid transparent;font:inherit;color:inherit;text-align:left;width:100%}
  .ag-row:hover{background:var(--mark)}
  .ag-row.sel{border-left-color:var(--wax,#A8402F);background:var(--mark)}
  .ag-row .r-no{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);flex:0 0 40px}
  .ag-row .r-main{flex:1;min-width:0}
  .ag-row .r-t{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;gap:6px;align-items:center}
  .ag-row .r-s{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .ag-row .r-side{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .ag-row .r-price{font-family:var(--mono);font-size:12px;white-space:nowrap}
  .ag-pill{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;
    padding:2px 8px;white-space:nowrap;border:1px solid var(--hairline-strong);color:var(--ink-soft);font-family:var(--sans)}
  .ag-pill.due{background:var(--wax,#A8402F);border-color:var(--wax,#A8402F);color:#fff}
  .ag-pill.ok{border-color:var(--ag-ok);color:var(--ag-ok)}
  .ag-pill.act{border-color:var(--ag-act);color:var(--ag-act)}

  /* -------- карточка дела -------- */
  .ag-card{border:1px solid var(--hairline);border-radius:var(--r);background:var(--sheet,transparent);
    padding:clamp(16px,2.4vw,26px);max-height:78vh;overflow-y:auto}
  .ag-card h2{font-size:clamp(18px,2vw,23px);font-weight:440;margin:4px 0 4px;line-height:1.25}
  .ag-topic{font-style:italic;color:var(--ink-soft);font-size:14px;margin-bottom:6px}
  .ag-stamp{display:inline-block;border:1.6px solid currentColor;border-radius:6px;padding:3px 10px;
    font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
    transform:rotate(-1.6deg);font-family:var(--sans);white-space:nowrap}
  .st-new{color:var(--ag-act)} .st-priced,.st-prepay{color:#8A6D1C}
  .st-work{color:var(--ag-ok)} .st-check{color:#6B4B8A} .st-fix{color:var(--wax,#A8402F)}
  .st-done{color:var(--ag-ok)} .st-cancel{color:var(--ink-faint)}
  .ag-meta{font-size:12.5px;color:var(--ink-soft);line-height:1.7}
  .ag-meta a{color:inherit}
  .ag-clinks{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .ag-clinks a{font-size:12px;border:1px solid var(--hairline-strong);border-radius:999px;
    padding:4px 11px;text-decoration:none;color:var(--ink);font-family:var(--sans)}
  .ag-clinks a:hover{border-color:var(--ink-soft);background:var(--mark)}

  .ag-sec{margin-top:20px;padding-top:15px;border-top:1px solid var(--hairline)}
  .ag-sec>.caps{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:10px}
  .ag-sec>.caps .sub{font-size:11px;color:var(--ink-soft);letter-spacing:.02em;text-transform:none;font-family:var(--sans)}
  .ag-actrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .ag-actrow input[type=number],.ag-actrow input[type=text]{font:inherit;font-size:14px;padding:9px 11px;
    border:1px solid var(--hairline-strong);border-radius:var(--r);background:transparent;color:inherit}
  .ag-actrow input[type=number]{width:118px}
  .ag-actrow textarea{flex:1;min-width:190px;font:inherit;font-size:14px;padding:9px 11px;
    border:1px solid var(--hairline-strong);border-radius:var(--r);background:transparent;color:inherit;resize:vertical}
  .ag-actrow select{font:inherit;font-size:13.5px;padding:9px 10px;border:1px solid var(--hairline-strong);
    border-radius:var(--r);background:var(--sheet,transparent);color:inherit}
  .ag-note{font-size:12px;color:var(--ink-soft);margin-top:7px;line-height:1.55}

  /* «что сейчас требуется» — подсказка в карточке */
  .ag-next{border:1px dashed var(--hairline-strong);border-left:4px solid var(--ag-act);
    border-radius:var(--r);padding:11px 14px;margin:14px 0 0;font-size:13.5px;line-height:1.55;background:var(--mark)}
  .ag-next b{font-weight:600}
  .ag-next.due{border-left-color:var(--wax,#A8402F)}

  /* план оплат */
  .ag-plan{border:1px solid var(--hairline);border-radius:var(--r);margin-top:8px;overflow:hidden}
  .ag-plan .pl-row{display:flex;gap:10px;align-items:center;padding:9px 13px;border-bottom:1px solid var(--hairline);font-size:13.5px}
  .ag-plan .pl-row:last-child{border-bottom:0}
  .ag-plan .pl-n{font-family:var(--mono);font-size:11px;color:var(--ink-soft);flex:0 0 16px}
  .ag-plan .pl-what{flex:1;min-width:0}
  .ag-plan .pl-sum{font-family:var(--mono);font-weight:600;white-space:nowrap}
  .ag-plan .pl-st{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
  .pl-paid{color:var(--ag-ok)} .pl-claimed{color:var(--wax,#A8402F);font-weight:600}
  .pl-due{color:var(--ag-act)} .pl-later{color:var(--ink-faint)}
  .ag-plan .btn{padding:7px 14px;min-height:0;font-size:12.5px}

  /* части сдачи */
  .ag-parts{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
  .ag-part{flex:1;min-width:130px;border:1px solid var(--hairline);border-radius:var(--r);padding:10px 12px;font-size:12.5px}
  .ag-part b{display:block;font-size:13px;margin-bottom:2px}
  .ag-part.past{border-color:var(--ag-ok);color:var(--ag-ok)}
  .ag-part.now{border-color:var(--ag-act);box-shadow:inset 0 0 0 1px var(--ag-act)}
  .ag-part .st{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft)}

  /* переписка */
  .ag-feed{display:flex;flex-direction:column;gap:9px;max-height:360px;overflow-y:auto;
    padding:13px;border:1px solid var(--hairline);border-radius:var(--r);background:var(--paper,transparent)}
  .ag-m{max-width:90%}
  .ag-m .who{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-family:var(--sans)}
  .ag-m .txt{font-size:13.5px;line-height:1.5;padding:8px 11px;border:1px solid var(--hairline);border-radius:8px;background:var(--sheet,transparent);overflow-wrap:anywhere}
  .ag-m.master{align-self:flex-end;text-align:right}
  .ag-m.master .txt{border-color:rgba(58,78,122,.5);background:rgba(58,78,122,.07);text-align:left}
  .ag-m .txt audio{max-width:100%;min-width:200px;height:34px;vertical-align:middle}
  .ag-m .txt img{max-width:min(240px,100%);border-radius:6px;display:block}
  .ag-sys{text-align:center;font-size:11.5px;color:var(--ink-soft)}
  .ag-chatform{display:flex;gap:8px;margin-top:10px;align-items:flex-end;flex-wrap:wrap}
  .ag-chatform textarea{flex:1;min-width:180px}
  .btn-upload input{display:none}

  /* файлы */
  .ag-file{display:flex;gap:9px;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--hairline);font-size:13px}
  .ag-file:last-child{border-bottom:0}
  .ag-file .fname{flex:1;min-width:0;overflow-wrap:anywhere}
  .ag-file .fmeta{font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
  .fl-tag{display:inline-block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    border:1px solid var(--hairline-strong);border-radius:999px;padding:1px 7px;margin-left:5px;color:var(--ink-soft);white-space:nowrap}

  /* статусы-кнопки */
  .ag-stbtn{border:1px solid var(--hairline-strong);background:transparent;color:inherit;border-radius:var(--r);
    padding:7px 11px;font-size:12.5px;cursor:pointer;font-family:var(--sans)}
  .ag-stbtn:hover{border-color:var(--ink-soft)}
  .ag-stbtn.on{background:var(--ink);color:var(--paper,#F6F1E7);border-color:var(--ink)}

  .ag-ev{font-size:12px;color:var(--ink-soft);line-height:1.8;font-family:var(--mono);letter-spacing:-.01em}
  .ag-empty{padding:34px;text-align:center;color:var(--ink-soft);font-size:14px}
  /* --- сертификаты --- */
  .ag-gifts{border:1px solid var(--hairline);border-radius:var(--r);background:var(--sheet,transparent);overflow:hidden}
  .ag-gift{border-bottom:1px solid var(--hairline)}
  .ag-gift:last-child{border-bottom:0}
  .ag-grow{display:flex;flex-direction:column;gap:3px;width:100%;text-align:left;background:none;
    border:0;border-left:3px solid transparent;padding:11px 13px;cursor:pointer;color:var(--ink);font:inherit}
  .ag-grow:hover{background:var(--mark)}
  .ag-gift.on .ag-grow{border-left-color:var(--wax,#A8402F);background:var(--mark)}
  .ag-grow .gg-t{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:13.5px}
  .ag-grow .gg-m{font-size:12px;color:var(--ink-soft)}
  .ag-gift-body{padding:12px 16px 16px;border-top:1px dashed var(--hairline)}
  .ag-kv{display:grid;gap:6px;margin-bottom:4px}
  .ag-kv>div{display:flex;gap:10px;font-size:13px;line-height:1.5}
  .ag-kv span{flex:0 0 128px;color:var(--ink-soft);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding-top:2px}
  .ag-kv b{font-weight:500;min-width:0;overflow-wrap:anywhere}
  .ag-evs{display:grid;gap:0;border:1px solid var(--hairline);border-radius:var(--r);overflow:hidden}
  .ag-evs .ag-ev{display:flex;gap:10px;align-items:baseline;padding:7px 11px;border-bottom:1px solid var(--hairline);font-size:12.5px}
  .ag-evs .ag-ev:last-child{border-bottom:0}
  .ag-evs .ag-ev span:first-child{flex:0 0 96px;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .ag-evs .ag-ev span:nth-child(2){flex:1;min-width:0}
  .ag-evs .ag-ev b{font-family:var(--mono);font-weight:600}
  .ag-evs .ag-ev b.neg{color:var(--wax,#A8402F)}
  .ag-evs .ag-ev b.pos{color:var(--ag-ok)}
  .ag-hint{font-size:12px;color:var(--ink-soft);line-height:1.55;margin:4px 0 0}
  .ag-login{max-width:480px;margin:8vh auto 0;text-align:center}

  /* интел-блок клиента */
  .ag-intel{border:1px solid var(--hairline-strong);border-left:3px solid var(--ag-act);border-radius:var(--r);
    padding:11px 13px;margin:14px 0 0;background:var(--paper,transparent)}
  .ag-intel .ai-row{display:flex;gap:10px;padding:3.5px 0;font-size:13px;align-items:baseline}
  .ag-intel .ai-k{flex:0 0 150px;color:var(--ink-soft);white-space:nowrap;font-size:12px}
  .ag-intel .ai-v{flex:1;min-width:0;overflow-wrap:anywhere}

  /* отзывы */
  .ag-rv{border:1px solid var(--hairline);border-radius:var(--r);padding:15px 17px;margin-bottom:12px;background:var(--sheet,transparent)}
  .ag-rv .rv-st{color:var(--wax,#A8402F);font-size:16px;letter-spacing:2px}
  .ag-rv .rv-st .dim{color:var(--hairline-strong)}
  .ag-rv blockquote{font-style:italic;font-size:14.5px;line-height:1.55;margin:8px 0}
  .ag-rv .rv-meta{font-size:12px;color:var(--ink-soft)}
  .ag-rv.pending{border-left:4px solid var(--wax,#A8402F)}
  .ag-rv.approved{border-left:4px solid var(--ag-ok)}
  .ag-rv.rejected{opacity:.6}

  /* приёмная: редактируемые поля пары вопрос-ответ */
  .ag-inp{width:100%;font:inherit;font-size:14px;padding:9px 11px;color:var(--ink);
    background:var(--paper,transparent);border:1px solid var(--hairline-strong);border-radius:var(--r)}
  textarea.ag-inp{resize:vertical;line-height:1.5}
  .ag-inp:focus{outline:2px solid var(--stamp,#3A4E7A);outline-offset:1px}

  .ag-lead{padding:11px 14px;border-bottom:1px solid var(--hairline);font-size:13.5px}
  .ag-lead:last-child{border-bottom:0}

  /* мобильный: карточка поверх списка */
  @media(max-width:960px){
    .ag-split{grid-template-columns:1fr}
    .ag-list{max-height:38vh}
    .ag-card{max-height:none}
    .ag-intel .ai-k{flex-basis:110px}
  }

  /* -------- «в эфире»: пульс-индикатор и счётчик на сайте -------- */
  .ag-live{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--hairline-strong);
    border-radius:999px;padding:5px 12px;font-size:12px;color:var(--ink-soft);cursor:pointer;
    background:var(--sheet,transparent);font-family:var(--sans);transition:border-color .15s}
  .ag-live:hover{border-color:var(--ink-soft);color:var(--ink)}
  .ag-live .ld{width:8px;height:8px;border-radius:50%;background:var(--ag-ok);
    box-shadow:0 0 0 0 rgba(46,107,79,.45);animation:agPulse 2.2s infinite}
  .ag-live.quiet .ld{background:var(--ink-faint);animation:none}
  .ag-live b{font-family:var(--mono);color:var(--ink)}
  @keyframes agPulse{0%{box-shadow:0 0 0 0 rgba(46,107,79,.45)}70%{box-shadow:0 0 0 7px rgba(46,107,79,0)}100%{box-shadow:0 0 0 0 rgba(46,107,79,0)}}

  /* -------- визиты: лента заходов -------- */
  .ag-vwrap{border:1px solid var(--hairline);border-radius:var(--r);background:var(--sheet,transparent);overflow:hidden}
  .ag-vrow{border-bottom:1px solid var(--hairline);padding:10px 14px;cursor:pointer}
  .ag-vrow:last-child{border-bottom:0}
  .ag-vrow:hover{background:var(--mark)}
  .ag-vrow .v-top{display:flex;gap:9px;align-items:baseline;flex-wrap:wrap;font-size:13.5px}
  .v-time{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}
  .v-on{width:7px;height:7px;border-radius:50%;background:var(--ag-ok);display:inline-block;flex:0 0 7px;
    align-self:center;animation:agPulse 2.2s infinite}
  .v-geo{font-weight:500}
  .v-dev{color:var(--ink-soft);font-size:12.5px}
  .v-who{margin-left:auto;font-size:12px;color:var(--ink-soft);white-space:nowrap;max-width:40%;overflow:hidden;text-overflow:ellipsis}
  .v-who.known{color:var(--ag-act);font-weight:600}
  .ag-vrow .v-sub{display:flex;gap:4px 12px;flex-wrap:wrap;margin-top:3px;font-size:12px;color:var(--ink-soft)}
  .v-step{color:var(--wax,#A8402F);font-weight:500}
  .v-step.done{color:var(--ag-ok)}
  .v-ref{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:min(360px,80vw)}
  .v-det{margin-top:9px;padding-top:9px;border-top:1px dashed var(--hairline);font-size:12.5px;
    color:var(--ink-soft);display:grid;gap:4px;overflow-wrap:anywhere}
  .v-det .mono{font-family:var(--mono);font-size:11.5px}
  .v-det a{color:var(--ag-act)}

  /* -------- метки мастера: пины, цвета, корзина -------- */
  .ag-row.pin .r-no{color:var(--ink);font-weight:700}
  .ag-row .r-pin{font-size:11px;flex:0 0 auto}
  .clr-dot{width:16px;height:16px;border-radius:50%;border:1px solid var(--hairline-strong);
    cursor:pointer;display:inline-block;padding:0;background:transparent}
  .clr-dot:hover{transform:scale(1.15)}
  .clr-dot.on{outline:2px solid var(--ink);outline-offset:1px}
  .ag-pal{display:inline-flex;gap:7px;align-items:center;border:1px dashed var(--hairline-strong);
    border-radius:999px;padding:5px 10px}
  .ag-ck{width:16px;height:16px;flex:0 0 16px;accent-color:var(--wax,#A8402F);cursor:pointer;margin:0}
  .ag-bulkbar{position:sticky;bottom:10px;z-index:30;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    border:1px solid var(--ink);border-radius:12px;background:var(--sheet,#FDFBF5);padding:9px 13px;
    box-shadow:0 8px 28px rgba(24,21,15,.18);margin-top:10px;font-size:13px}
  .ag-bulkbar .btn{min-height:0;padding:7px 12px;font-size:12.5px}

  /* быстрые действия в шапке карточки дела */
  .ag-quick{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .ag-qbtn{border:1px solid var(--hairline-strong);background:transparent;color:var(--ink-soft);
    border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);
    transition:color .15s,border-color .15s}
  .ag-qbtn:hover{border-color:var(--ink-soft);color:var(--ink)}
  .ag-qbtn.on{background:var(--ink);border-color:var(--ink);color:var(--paper,#F6F1E7)}
</style>
